name: Bug report
description: Report a reproducible bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact commands and sample files if possible.
      placeholder: |
        1. Run `pixshift ...`
        2. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PixShift version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "e.g. 3.11"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, and any relevant dependency versions.
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell

